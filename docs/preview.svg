<svg width="1600" height="800" viewBox="0 0 1600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="800" fill="#f5f1ea"/>
  <style>
    .ui { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .eyebrow { fill: #b8794d; font-size: 13px; font-weight: 800; letter-spacing: .14em; }
    .title { fill: #261c17; font-size: 30px; font-weight: 800; }
    .muted { fill: #7c756f; font-size: 14px; }
    .small { fill: #8c8882; font-size: 12px; }
    .panelTitle { fill: #efe7dc; font-size: 16px; font-weight: 800; }
    .panelText { fill: #b9c1cc; font-size: 12px; }
    .treeText { fill: #f4efe8; font-size: 16px; font-weight: 800; }
    .treeSub { fill: #aeb7c6; font-size: 11px; font-weight: 700; }
    .brainStroke { fill: none; stroke: #b56f62; stroke-width: 8; stroke-linecap: round; opacity: .34; }
  </style>
  <defs>
    <linearGradient id="viewerBg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#faf7f0"/>
      <stop offset="1" stop-color="#e8e0d5"/>
    </linearGradient>
    <linearGradient id="panelBg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#121923"/>
      <stop offset="1" stop-color="#0a0f17"/>
    </linearGradient>
    <radialGradient id="brainMain" cx="0.45" cy="0.42" r="0.75">
      <stop stop-color="#f2c8ba"/>
      <stop offset="0.55" stop-color="#d89183"/>
      <stop offset="1" stop-color="#ad665c"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity=".18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <g class="ui" transform="translate(36 26)">
    <rect x="0" y="0" width="1160" height="120" rx="28" fill="#fffaf2" stroke="#e0d6c9"/>
    <text class="eyebrow" x="34" y="38">BRAIN ATLAS 3D</text>
    <text class="title" x="34" y="76">可旋转、可定位、可点击的 3D 人脑结构学习工具</text>
    <rect x="962" y="34" width="138" height="44" rx="22" fill="#f3eadf" stroke="#d9c9b8"/>
    <text class="muted" x="1002" y="62">重置视角</text>

    <g transform="translate(0 146)">
      <rect width="1160" height="590" rx="30" fill="url(#viewerBg)" stroke="#d7cdc2"/>
      <text class="small" x="26" y="560">拖拽旋转，滚轮缩放，点击脑区查看解释。</text>
      <g transform="translate(270 56)" filter="url(#shadow)">
        <ellipse cx="324" cy="236" rx="306" ry="198" fill="#d7cec1" opacity=".42" filter="url(#soft)"/>
        <path d="M111 263C60 229 45 158 86 106C118 65 170 57 212 72C239 27 314 25 360 60C406 38 475 53 503 105C561 109 606 162 592 222C638 268 613 350 543 367C522 420 452 439 406 403C367 444 292 439 264 389C205 409 144 377 143 318C126 303 115 284 111 263Z" fill="url(#brainMain)"/>
        <path d="M112 140C163 112 211 126 243 166" class="brainStroke"/>
        <path d="M210 84C263 88 300 119 309 171" class="brainStroke"/>
        <path d="M327 78C385 104 404 154 389 210" class="brainStroke"/>
        <path d="M132 235C191 202 249 214 287 262" class="brainStroke"/>
        <path d="M311 245C375 208 436 221 485 274" class="brainStroke"/>
        <path d="M226 338C286 300 351 304 399 352" class="brainStroke"/>
        <path d="M96 218C143 222 177 253 184 301" class="brainStroke"/>
        <path d="M464 124C522 149 544 206 522 266" class="brainStroke"/>
        <path d="M191 69C225 96 231 141 208 179" class="brainStroke"/>
        <path d="M384 375C429 341 489 345 529 383" class="brainStroke"/>
        <path d="M105 263C58 230 43 158 84 106C116 65 168 57 211 72C238 27 313 25 359 60C405 38 474 53 502 105C560 109 605 162 591 222C637 268 612 350 542 367C522 420 451 439 405 403C366 444 291 439 263 389C204 409 143 377 142 318C125 303 114 284 105 263Z" fill="#c96f66" opacity=".34"/>
        <path d="M76 252C113 187 194 148 289 144C378 140 467 170 533 223" fill="#efb3a5" opacity=".9"/>
        <path d="M81 249C129 198 191 173 266 170C344 168 417 189 485 235" stroke="#df8f82" stroke-width="7" stroke-linecap="round" opacity=".45"/>
      </g>
    </g>
  </g>

  <g class="ui" transform="translate(1224 26)">
    <rect width="340" height="736" rx="30" fill="url(#panelBg)" stroke="#283241"/>
    <text class="eyebrow" x="28" y="42">REGION DIRECTORY</text>
    <text class="panelTitle" x="28" y="76">脑区目录</text>
    <text class="panelText" x="28" y="100">按宏观神经解剖层级组织，点击后聚焦对应脑区。</text>

    <g transform="translate(24 132)">
      <rect width="292" height="44" rx="12" fill="#222b37" stroke="#596273"/>
      <text class="treeText" x="18" y="28">大脑 / 端脑</text>
      <text class="treeSub" x="228" y="27">-</text>
      <g transform="translate(14 58)">
        <rect width="264" height="42" rx="10" fill="#1a222e" stroke="#3d4857"/>
        <text class="treeText" x="16" y="27">额叶</text>
        <text class="treeSub" x="198" y="27">Frontal Lobe</text>
      </g>
      <g transform="translate(14 110)">
        <rect width="264" height="128" rx="12" fill="#111925" stroke="#3c4654" stroke-dasharray="3 3"/>
        <rect x="12" y="12" width="240" height="38" rx="9" fill="#2f3745" stroke="#f0b9a7"/>
        <text class="treeText" x="26" y="36">前额叶</text>
        <text class="treeSub" x="162" y="35">Prefrontal</text>
        <rect x="12" y="62" width="240" height="38" rx="9" fill="#18212d" stroke="#344052"/>
        <text class="treeText" x="26" y="86">运动皮层</text>
        <text class="treeSub" x="162" y="85">Motor Cortex</text>
      </g>
      <g transform="translate(0 258)">
        <rect width="292" height="44" rx="12" fill="#202936" stroke="#424d5e"/>
        <text class="treeText" x="18" y="28">顶叶</text>
        <text class="treeSub" x="218" y="27">+</text>
      </g>
      <g transform="translate(0 314)">
        <rect width="292" height="44" rx="12" fill="#202936" stroke="#424d5e"/>
        <text class="treeText" x="18" y="28">颞叶</text>
        <text class="treeSub" x="218" y="27">+</text>
      </g>
      <g transform="translate(0 370)">
        <rect width="292" height="44" rx="12" fill="#202936" stroke="#424d5e"/>
        <text class="treeText" x="18" y="28">枕叶</text>
        <text class="treeSub" x="218" y="27">+</text>
      </g>
      <g transform="translate(0 426)">
        <rect width="292" height="44" rx="12" fill="#202936" stroke="#424d5e"/>
        <text class="treeText" x="18" y="28">胼胝体</text>
        <text class="treeSub" x="182" y="27">Corpus Callosum</text>
      </g>
      <g transform="translate(0 500)">
        <rect width="292" height="86" rx="16" fill="#f7efe3" stroke="#d8c9b8"/>
        <text x="18" y="30" fill="#2b211a" font-size="16" font-weight="800">当前脑区：前额叶</text>
        <text x="18" y="58" fill="#655c55" font-size="12">显示位置、功能、系统连接与资料来源。</text>
      </g>
    </g>
  </g>
</svg>
