<svg width="1320" height="520" viewBox="0 0 1320 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1320" height="520" rx="28" fill="#080B12"/>
  <style>
    .title { fill: #fff7ec; font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .desc { fill: #aeb7c6; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .tag { fill: #f7d7bf; font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .brain-base { fill: #b98275; stroke: #d3a091; stroke-width: 1; opacity: 0.95; }
    .brain-gyrus { fill: none; stroke: #704238; stroke-width: 8; stroke-linecap: round; opacity: 0.4; }
    .panel { fill: #101620; stroke: rgba(255,255,255,0.1); stroke-width: 1.2; }
  </style>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="verySoftGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(30 28)">
    <rect class="panel" width="390" height="464" rx="24"/>
    <text class="title" x="24" y="42">A. 专业图谱式描边</text>
    <text class="desc" x="24" y="70">全脑保持原材质，只给选中区加细轮廓线。</text>
    <g transform="translate(48 114)" filter="url(#softShadow)">
      <path class="brain-base" d="M72 174C42 155 30 108 55 75C72 51 104 47 132 54C150 29 191 24 220 42C244 31 281 42 295 72C329 75 350 104 345 139C371 169 352 217 312 225C302 254 263 266 235 250C211 274 168 271 150 245C119 255 84 237 82 205C76 197 72 185 72 174Z"/>
      <path class="brain-gyrus" d="M85 107C119 89 143 103 164 123"/>
      <path class="brain-gyrus" d="M151 72C181 72 201 90 209 118"/>
      <path class="brain-gyrus" d="M218 72C247 85 258 111 252 142"/>
      <path class="brain-gyrus" d="M95 165C127 149 159 155 181 181"/>
      <path class="brain-gyrus" d="M197 163C232 146 266 153 293 180"/>
      <path class="brain-gyrus" d="M145 219C177 199 212 200 240 225"/>
      <path d="M260 154C287 143 315 155 322 183C330 215 298 234 270 221C243 208 233 166 260 154Z" fill="none" stroke="#8FD4FF" stroke-width="5"/>
      <path d="M260 154C287 143 315 155 322 183C330 215 298 234 270 221C243 208 233 166 260 154Z" fill="none" stroke="#D8F3FF" stroke-width="1.5"/>
    </g>
    <text class="tag" x="24" y="418">适合：外侧皮层、大脑叶、半球</text>
    <text class="desc" x="24" y="444">优点：克制、专业、不遮挡沟回纹理。</text>
  </g>

  <g transform="translate(465 28)">
    <rect class="panel" width="390" height="464" rx="24"/>
    <text class="title" x="24" y="42">B. 局部色温高亮</text>
    <text class="desc" x="24" y="70">全脑不变暗，选中区换成柔和色温。</text>
    <g transform="translate(48 114)" filter="url(#softShadow)">
      <path class="brain-base" d="M72 174C42 155 30 108 55 75C72 51 104 47 132 54C150 29 191 24 220 42C244 31 281 42 295 72C329 75 350 104 345 139C371 169 352 217 312 225C302 254 263 266 235 250C211 274 168 271 150 245C119 255 84 237 82 205C76 197 72 185 72 174Z"/>
      <path class="brain-gyrus" d="M85 107C119 89 143 103 164 123"/>
      <path class="brain-gyrus" d="M151 72C181 72 201 90 209 118"/>
      <path class="brain-gyrus" d="M218 72C247 85 258 111 252 142"/>
      <path class="brain-gyrus" d="M95 165C127 149 159 155 181 181"/>
      <path class="brain-gyrus" d="M197 163C232 146 266 153 293 180"/>
      <path class="brain-gyrus" d="M145 219C177 199 212 200 240 225"/>
      <path d="M260 154C287 143 315 155 322 183C330 215 298 234 270 221C243 208 233 166 260 154Z" fill="#E7B7AA" stroke="#F4D0C5" stroke-width="2.5"/>
      <path d="M267 176C285 169 303 177 306 192" stroke="#A56B5E" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
    </g>
    <text class="tag" x="24" y="418">适合：大区域、高频点击区域</text>
    <text class="desc" x="24" y="444">优点：自然，不像“金子发光”。</text>
  </g>

  <g transform="translate(900 28)">
    <rect class="panel" width="390" height="464" rx="24"/>
    <text class="title" x="24" y="42">C+D. 柔和色罩 + 引导线</text>
    <text class="desc" x="24" y="70">淡色覆盖 + 细描边，小标签远离结构。</text>
    <g transform="translate(48 114)" filter="url(#softShadow)">
      <path class="brain-base" d="M72 174C42 155 30 108 55 75C72 51 104 47 132 54C150 29 191 24 220 42C244 31 281 42 295 72C329 75 350 104 345 139C371 169 352 217 312 225C302 254 263 266 235 250C211 274 168 271 150 245C119 255 84 237 82 205C76 197 72 185 72 174Z"/>
      <path class="brain-gyrus" d="M85 107C119 89 143 103 164 123"/>
      <path class="brain-gyrus" d="M151 72C181 72 201 90 209 118"/>
      <path class="brain-gyrus" d="M218 72C247 85 258 111 252 142"/>
      <path class="brain-gyrus" d="M95 165C127 149 159 155 181 181"/>
      <path class="brain-gyrus" d="M197 163C232 146 266 153 293 180"/>
      <path class="brain-gyrus" d="M145 219C177 199 212 200 240 225"/>
      <path d="M260 154C287 143 315 155 322 183C330 215 298 234 270 221C243 208 233 166 260 154Z" fill="#8FD4FF" fill-opacity="0.22" stroke="#8FD4FF" stroke-width="3"/>
      <circle cx="286" cy="188" r="22" stroke="#D8F3FF" stroke-width="2" opacity="0.85"/>
      <path d="M306 174L352 123" stroke="#D8F3FF" stroke-width="1.5" opacity="0.75"/>
      <rect x="342" y="92" width="88" height="34" rx="17" fill="rgba(8,11,18,0.9)" stroke="#8FD4FF" stroke-width="1"/>
      <text x="386" y="114" text-anchor="middle" fill="#D8F3FF" font-size="13" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">脑区名</text>
    </g>
    <text class="tag" x="24" y="418">适合：小结构、深部结构、综合展示</text>
    <text class="desc" x="24" y="444">优点：最清楚，且标签不压住 3D 部位。</text>
  </g>
</svg>
